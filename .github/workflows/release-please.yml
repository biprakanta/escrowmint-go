name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: escrowmint-go-release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || github.token }}

  verify-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -coverprofile=coverage.out

      - name: Run consumer smoke test
        run: |
          tmpdir="$(mktemp -d)"
          cat > "${tmpdir}/go.mod" <<EOF
          module smoke

          go 1.22.0

          require github.com/biprakanta/escrowmint-go v0.0.0

          replace github.com/biprakanta/escrowmint-go => ${GITHUB_WORKSPACE}
          EOF
          cat > "${tmpdir}/main.go" <<'EOF'
          package main

          import (
            "context"
            "fmt"

            "github.com/biprakanta/escrowmint-go/escrowmint"
          )

          func main() {
            client, err := escrowmint.NewClient(context.Background(), escrowmint.Config{})
            if err != nil {
              panic(err)
            }
            fmt.Println(client.Config().KeyPrefix)
          }
          EOF
          cd "${tmpdir}"
          go mod tidy
          go run .
